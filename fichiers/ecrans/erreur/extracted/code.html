<style>

      .scanner-viewport {
        position: relative;

      }
      .scanner-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        pointer-events: none;
      }
      .scanner-cutout {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 260px;
        height: 180px;
        background: transparent;
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
        border: 2px solid white;
        border-radius: 12px;
      }
      .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: #0066ff;
        box-shadow: 0 0 8px #0066ff;
        animation: scan 2.5s ease-in-out infinite;
      }
      @keyframes scan {
        0%, 100% { top: 0; }
        50% { top: 100%; }
      }
      .bottom-sheet {
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
      }
      .material-symbols-outlined {

<script>
        // Micro-interactions and scanner behavior
        document.addEventListener('DOMContentLoaded', () => {
            const flashBtn = document.getElementById('flash-toggle');
            let flashOn = false;

            flashBtn.addEventListener('click', () => {
                flashOn = !flashOn;
                const icon = flashBtn.querySelector('.material-symbols-outlined');
                if (flashOn) {
                    icon.innerText = 'flash_off';
                    flashBtn.classList.add('bg-primary/20');
                    // Simulate flash activation with a quick screen overlay pulse
                    const pulse = document.createElement('div');
                    pulse.className = 'fixed inset-0 bg-white pointer-events-none z-[100] transition-opacity duration-300';
                    document.body.appendChild(pulse);
                    setTimeout(() => pulse.classList.add('opacity-0'), 10);
                    setTimeout(() => pulse.remove(), 310);
                } else {
                    icon.innerText = 'flash_on';
                    flashBtn.classList.remove('bg-primary/20');
                }
            });

            // Simulate scanning sound or haptic feedback
            const scannerFrame = document.querySelector('.scanner-cutout');
            setInterval(() => {
                // Random subtle movement to indicate "activity"
                scannerFrame.style.transition = 'all 2s ease-in-out';
                const offsetX = (Math.random() - 0.5) * 4;
                const offsetY = (Math.random() - 0.5) * 4;
                scannerFrame.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px))`;
            }, 3000);

            // Delete item animation
            const deleteButtons = document.querySelectorAll('.text-error');
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const item = this.closest('.flex');
                    item.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                    item.style.transform = 'translateX(100px)';
                    item.style.opacity = '0';
                    setTimeout(() => {
                        item.remove();
                    }, 400);
                });
            });
        });
    </script>
