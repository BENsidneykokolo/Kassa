<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .success-bg-animate {
            background: linear-gradient(135deg, #E1F5EE 0%, #ffffff 100%);
        }

            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter-mobile md:p-gutter-desktop">
<!-- Blurred Background Content Mockup (Inventory Summary) -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none overflow-hidden">
<div class="max-w-4xl mx-auto mt-20 space-y-stack-gap-lg px-4">
<div class="h-10 w-48 bg-primary-container rounded-lg"></div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<div class="h-32 bg-surface-variant rounded-xl"></div>
<div class="h-32 bg-surface-variant rounded-xl"></div>
<div class="h-32 bg-surface-variant rounded-xl"></div>
<div class="h-32 bg-surface-variant rounded-xl"></div>
</div>
<div class="h-64 bg-surface-container rounded-2xl"></div>
</div>
</div>
<!-- Backdrop Overlay -->
<div class="fixed inset-0 bg-on-background/40 backdrop-blur-sm z-40"></div>
<!-- Success Popup (The Canvas Focus) -->
<div class="relative z-50 w-full max-w-[480px] animate-pop">
<div class="bg-surface rounded-[32px] shadow-2xl overflow-hidden flex flex-col items-center p-stack-gap-lg border border-white/20">
<!-- Success Icon Section -->
<div class="relative w-24 h-24 mb-6">
<div class="absolute inset-0 bg-surface-success rounded-full flex items-center justify-center animate-pulse opacity-50"></div>
<div class="relative z-10 w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Header Text -->
<div class="text-center space-y-unit mb-stack-gap-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Inventaire enregistré</h1>
<p class="font-body-md text-body-md text-on-surface-variant px-4">Votre résumé d'inventaire a été mis à jour avec succès dans le système central de Kassa Store.</p>
</div>
<!-- Inventory Summary Mini Card (Asymmetric Layout) -->
<div class="w-full bg-surface-container-low rounded-2xl p-4 mb-stack-gap-lg flex flex-col gap-3">
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Articles Totaux</span>
<span class="font-headline-md text-headline-md text-primary">1,428</span>
</div>
<div class="h-[1px] bg-outline-variant/30"></div>
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Valeur du Stock</span>
<span class="font-headline-md text-headline-md text-on-surface">€14,250.00</span>
</div>
</div>
<!-- High-Contrast Action Buttons -->
<div class="w-full flex flex-col gap-3">
<!-- Action 1: Export -->
<button class="w-full group relative h-14 bg-inverse-surface hover:bg-on-background transition-all duration-300 rounded-xl flex items-center justify-center gap-3 overflow-hidden active:scale-[0.98]">
<div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-surface-bright" data-icon="gallery_thumbnail">gallery_thumbnail</span>
<span class="font-label-md text-label-md text-surface-bright tracking-wide">EXPORTER EN JPEG</span>
</button>
<!-- Action 2: Contact -->
<button class="w-full group h-14 bg-surface-container-high hover:bg-surface-variant transition-all duration-300 rounded-xl flex items-center justify-center gap-3 active:scale-[0.98]">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="phone_in_talk">phone_in_talk</span>
<span class="font-label-md text-label-md text-on-surface tracking-wide">CONTACTER LES FOURNISSEURS</span>
</button>
<!-- Action 3: Dismiss -->
<button class="w-full h-12 flex items-center justify-center font-label-md text-label-md text-primary hover:bg-surface-success rounded-xl transition-colors mt-2" onclick="window.location.reload()">
                    Retour au tableau de bord
                </button>
</div>
</div>
<!-- Decorative African Pattern Accent -->
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-[80%] h-2 bg-primary rounded-b-full opacity-30 blur-sm"></div>
</div>
<!-- Small Footer Brand Anchor -->
<div class="fixed bottom-6 z-50">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container/80 backdrop-blur rounded-full border border-outline-variant/20 shadow-sm">
<span class="font-headline-md text-headline-md font-bold text-primary">Yabisso Kassa</span>
<span class="w-[1px] h-4 bg-outline-variant"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant">GESTION D'INVENTAIRE PRO</span>
</div>
</div>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                let ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.width = '10px';
                ripple.style.height = '10px';
                ripple.style.background = 'rgba(255, 255, 255, 0.3)';
                ripple.style.borderRadius = '50%';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.6s linear, opacity 0.6s linear';
                ripple.style.pointerEvents = 'none';
                
                btn.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.style.transform = 'scale(40)';
                    ripple.style.opacity = '0';
                }, 10);
                
                setTimeout(() => { ripple.remove(); }, 700);
            });
        });
    </script>
</body></html>
